<style>
:root{--navy:#0d3b6e;--green:#0e7c3a;--red:#a32d2d;--fs:system-ui,-apple-system,sans-serif}

body{font-family:var(--fs);font-size:14px;color:#111;background:#eef0f3;min-height:100vh}

.tab:hover:not(.active){background:#f9fafb}
.btn{padding:6px 14px;border:1px solid #e5e7eb;border-radius:8px;cursor:pointer;font-size:12px;background:transparent;color:#111;font-family:var(--fs)}
.btn:hover{background:#f9fafb}
.btn-p{background:var(--navy)!important;color:#fff!important;border-color:var(--navy)!important}
.btn-p:hover{background:#0a2f58!important}
.btn-g{background:var(--green)!important;color:#fff!important;border-color:var(--green)!important}
.btn-g:hover{background:#0b6330!important}
.btn-r{color:var(--red)!important;border-color:transparent!important}
.btn-r:hover{background:#fef2f2!important}
.btn-link{padding:5px 12px;background:var(--green);color:#fff;border-radius:8px;font-size:12px;text-decoration:none;display:inline-flex;align-items:center;gap:4px;border:none;cursor:pointer;font-family:var(--fs)}
.btn-link:hover{background:#0b6330}
.content{padding:16px;max-width:1400px;margin:0 auto}
.zone-bar{display:flex;gap:6px;margin-bottom:14px;align-items:center;flex-wrap:wrap}
.zone-btn{padding:5px 14px;border:1px solid #e5e7eb;border-radius:20px;cursor:pointer;font-size:13px;background:transparent;color:#6b7280;font-family:var(--fs)}
.zone-btn.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.kanban{display:flex;gap:10px;overflow-x:auto;padding-bottom:12px;align-items:flex-start}
.col{min-width:200px;flex:0 0 200px;background:#fff;border-radius:12px;padding:10px;border:1px solid #e5e7eb}
.col-head{display:flex;align-items:center;gap:4px;margin-bottom:8px}
.col-name{font-size:12px;font-weight:500;background:transparent;border:none;color:#111;flex:1;outline:none;min-width:0;font-family:var(--fs)}
.col-name:focus{background:#f3f4f6;border-radius:4px;padding:1px 4px}
.col-cnt{font-size:10px;background:#f3f4f6;border:1px solid #e5e7eb;border-radius:10px;padding:1px 6px;color:#6b7280;white-space:nowrap;flex-shrink:0}

.drag-handle{font-size:16px;color:#9ca3af;cursor:grab;padding:0 4px;flex-shrink:0;user-select:none;line-height:1}
.drag-handle:hover{color:#6b7280}
.zone-bar-line{height:6px;border-radius:2px;margin-bottom:14px;transition:background .3s}
.add-col{min-width:140px;flex:0 0 140px;border:1.5px dashed #e5e7eb;border-radius:12px;padding:10px;display:flex;align-items:center;justify-content:center;gap:4px;cursor:pointer;font-size:12px;color:#9ca3af;background:transparent}
.add-col:hover{background:#f9fafb;border-color:#9ca3af}
.drop-zone{min-height:32px}
.card.readonly{opacity:.85;border-left:3px solid #cbd5e1;cursor:default}
.card.readonly:hover{border-color:#e5e7eb}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:8px 28px 8px 28px;margin-bottom:6px;cursor:pointer;position:relative;transition:border-color .15s}

.m-title{font-size:15px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.m-close{background:none;border:none;cursor:pointer;font-size:20px;color:#9ca3af}
.fr{margin-bottom:10px}
.fl{display:block;font-size:11px;color:#6b7280;margin-bottom:3px;font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.fi{width:100%;padding:7px 10px;border:1px solid #e5e7eb;border-radius:8px;font-size:13px;background:#fff;color:#111;font-family:var(--fs)}

.m-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;padding-top:12px;border-top:1px solid #e5e7eb;flex-wrap:wrap}
.drop-list{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid #e5e7eb;border-radius:8px;z-index:300;max-height:180px;overflow-y:auto;box-shadow:0 4px 16px rgba(0,0,0,.1)}

.dup-box{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;background:#fef9c3;border-radius:8px;font-size:12px;margin-top:6px}
.cv-sec{border-top:1px solid #f3f4f6;padding-top:10px;margin-top:10px}
.cv-row{display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.cv-lbl{font-size:11px;color:#6b7280;width:90px;flex-shrink:0}
.cv-up{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border:1px solid #e5e7eb;border-radius:8px;cursor:pointer;font-size:11px;color:#6b7280;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cv-up:hover{background:#f3f4f6}
.cv-up.has{background:#f0faf4;color:#166534;border-color:#86efac}
.bloc-mail{background:#f9fafb;border-radius:8px;padding:12px;font-size:12px;white-space:pre-wrap;font-family:monospace;border:1px solid #e5e7eb;max-height:140px;overflow-y:auto;line-height:1.6}
.mail-preview{background:#f9fafb;border-radius:8px;padding:14px;font-size:12px;white-space:pre-wrap;font-family:monospace;border:1px solid #e5e7eb;max-height:360px;overflow-y:auto;line-height:1.7}
.divider{border:none;border-top:1px solid #f3f4f6;margin:12px 0}
.profils-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.pc{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:10px 10px 10px 28px;cursor:pointer;position:relative;transition:border-color .15s}
.pc:hover{border-color:var(--navy)}
.pc.sel{border-color:var(--green);background:#f0faf4}
.pc-src{font-size:10px;color:#9ca3af;margin-bottom:3px;font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.pc-name{font-size:13px;font-weight:600}

.lt{width:100%;border-collapse:collapse;font-size:12px;background:#fff}

.lt tr.sel td{background:#f0faf4}
.lt tr:hover td{background:#f9fafb}
.tvw{display:flex;border:1px solid #e5e7eb;border-radius:8px;overflow:hidden}
.tvw button{padding:5px 12px;background:transparent;border:none;cursor:pointer;font-size:12px;color:#6b7280;font-family:var(--fs)}
.tvw button.active{background:var(--navy);color:#fff}
.pg{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px}
.pc2{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:12px;cursor:pointer;transition:border-color .15s}
.pc2:hover{border-color:var(--navy)}
.u-r{color:var(--red)}.u-n{font-weight:600}.u-j{color:#854d0e}
.tb{display:flex;gap:8px;margin-bottom:14px;align-items:center;flex-wrap:wrap}
.par-sec{margin-bottom:22px;background:#fff;border-radius:12px;padding:16px;border:1px solid #e5e7eb}
.par-sec h3{font-size:13px;font-weight:600;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;gap:6px}
.par-item{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #f3f4f6}
.par-item:last-child{border-bottom:none}
.toast{position:fixed;bottom:20px;right:20px;background:#111;color:#fff;padding:10px 16px;border-radius:8px;font-size:13px;z-index:500;transition:opacity .3s;max-width:320px}
.toast.hide{opacity:0;pointer-events:none}
.toast.warn{background:#854d0e}
.toast.ok{background:#166534}
.loader-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,.7);display:flex;align-items:center;justify-content:center;z-index:100;font-size:13px;color:#6b7280;gap:10px}
.spinner{width:20px;height:20px;border:2px solid #e5e7eb;border-top-color:var(--navy);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.badge-mail{background:var(--red);color:#fff;font-size:10px;padding:1px 5px;border-radius:8px;margin-left:4px;font-weight:600}
.analyse-sec{border-top:1px solid #f3f4f6;padding-top:10px;margin-top:10px}
.analyse-table{width:100%;border-collapse:collapse;font-size:11px;margin-top:8px}
.analyse-table th{text-align:left;padding:5px 7px;border-bottom:1px solid #e5e7eb;font-size:10px;color:#6b7280;font-weight:600;background:#f9fafb}
.analyse-table td{padding:5px 7px;border-bottom:1px solid #f3f4f6;vertical-align:top}
.analyse-table td:first-child{font-weight:500;color:#111}
.verdict-analyse{background:#f9fafb;border-radius:8px;padding:10px 12px;font-size:12px;line-height:1.7;margin-top:8px;border:1px solid #e5e7eb}
.verdict-analyse p{margin-bottom:4px}
.score-m{background:#dcfce7;color:#166534}.score-p{background:#fef9c3;color:#854d0e}.score-n{background:#fee2e2;color:#991b1b}
.info-banner{background:#dbeafe;border:1px solid #bfdbfe;border-radius:8px;padding:10px 14px;font-size:12px;color:#1e40af;margin-bottom:14px;display:flex;align-items:center;gap:8px}
</style>
</head>
<body>


<div id="loader" class="loader-overlay" style="display:none">
  <div class="spinner"></div> Chargement des données...
</div>

<div class="topbar">
  <span class="logo">Notion <span>TAFINAR</span></span><span style="font-size:10px;color:#9ca3af;margin-left:6px">v55</span>
  <div id="topbar-user" style="display:flex;align-items:center;gap:8px;font-size:12px"></div>
  <button id="mail-btn" class="btn" onclick="openMailModal()" style="opacity:.4;pointer-events:none;border-color:var(--green);color:var(--green);font-size:12px">
    <i class="ti ti-mail" aria-hidden="true"></i> Mail récap
  </button>
  <div class="nav">
    <button class="tab active" onclick="showTab('s')">Sourceurs</button>
    <button class="tab" onclick="showTab('p')">Les Profils</button>
    <button class="tab" onclick="showTab('po')">Postes</button>
    <button class="tab" onclick="showTab('cfg')">Paramètres</button>
    <button class="tab" onclick="showTab('trash')" id="tab-trash-btn">🗑 Corbeille <span id="trash-count" style="background:#dc2626;color:#fff;border-radius:10px;padding:1px 6px;font-size:10px;display:none">0</span></button>
  </div>
  <button class="btn-link" onclick="window.parent.switchTo('rec')"><i class="ti ti-arrows-exchange" aria-hidden="true"></i> Recrutement TAFINAR</button>
</div>

<div class="content" id="main"></div>
<div id="mroot"></div>
<div id="toast" class="toast hide"></div>

<script>
// ═══════════════════════════════════════
// SUPABASE
// ═══════════════════════════════════════
const SB_URL = 'https://lqqgweqsscyfrqosbcah.supabase.co';
const SB_KEY = 'sb_publishable_HpXipfY__RmCKOqeGZZMHQ_wJ83l2Yi';
const sb = window.supabase.createClient(SB_URL, SB_KEY);

// ═══════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════
const VILLES = ["Paris","Lyon","Marseille","Toulouse","Nice","Nantes","Strasbourg","Montpellier","Bordeaux","Lille","Rennes","Reims","Saint-Étienne","Toulon","Le Havre","Grenoble","Dijon","Angers","Nîmes","Brest","Tours","Amiens","Limoges","Perpignan","Metz","Besançon","Orléans","Rouen","Caen","Nancy","Mulhouse","Avignon","Pau","Versailles","Poitiers","Courbevoie","Boulogne-Billancourt","Bourges","La Rochelle","Calais","Antibes","Cannes","Issy-les-Moulineaux","Saint-Nazaire","Levallois-Perret","Quimper","Troyes","Valence","Évreux","Blois","Chartres","Cergy","Marignane","Vitrolles","Aubagne","Istres","Fos-sur-Mer","Salon-de-Provence","Arles","Béziers","Sète","Montauban","Albi","Tarbes","Thionville","Saint-Dizier","Belfort","Montbéliard","Chalon-sur-Saône","Annecy","Chambéry","Fréjus","Draguignan","Hyères","La Ciotat","Martigues","Saint-Raphaël","Menton","Grasse","Sophia Antipolis","Lorient","Vannes","Saint-Brieuc","Lannion","Cherbourg","Bayeux","Deauville","La Roche-sur-Yon","Niort","Angoulême","Saintes","Rochefort","Royan","Libourne","Périgueux","Bergerac","Agen","Mont-de-Marsan","Dax","Bayonne","Biarritz","Anglet","Rueil-Malmaison","Nanterre","Vitry-sur-Seine","Créteil","Dunkerque","Colombes","Tourcoing","Roubaix","Valenciennes","Aubervilliers","Aulnay-sous-Bois","Asnières-sur-Seine","Fontenay-sous-Bois","Noisy-le-Grand","Sartrouville","France entière","Île-de-France","PACA","Occitanie","Bretagne","Grand Est","Normandie","Hauts-de-France","Remote","Full remote"];
const DISPOS = ["Immédiatement","1 mois","2 mois","3 mois"];
const DEFAULT_STATUTS = ['🆕 Nouveau','📤 À appeler','✅ À envoyer','⏳ En attente','📦 Archiver'];

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let eCV = {o:null, a:null};
let eCVFiles = {o:null, a:null};
let pendingAnalyse = null;

// ── Render analysis block (from Recrutement TAFINAR) ──
function renderAnalyse(analyse){
  if(!analyse||!analyse.criteres?.length)return'';
  const iconMap={ok:'✅',partial:'⚠️',partiel:'⚠️',ko:'❌',non:'❌',na:'⬜',no:'❌'};
  const poidsMap={essentiel:'Essentiel',important:'Important',secondaire:'Secondaire'};
  const rows=analyse.criteres.map(c=>`<tr>
    <td class="crit-analyse">${esc(c.nom||'')}</td>
    <td style="text-align:center;color:#6b7280;font-size:10px">${poidsMap[c.poids]||c.poids||''}</td>
    <td style="text-align:center;font-size:14px">${iconMap[c.statut]||'⬜'}</td>
    <td style="color:#6b7280;font-size:10px">${esc(c.commentaire||'')}</td>
  </tr>`).join('');
  const verdict=(analyse.verdictPhrases||[]).map(p=>`<p>${esc(p)}</p>`).join('');
  const dateInfo=analyse.date?`<span style="font-size:10px;color:#9ca3af;margin-left:8px">Analysé le ${esc(analyse.date)}</span>`:'';
  const scoreClass=analyse.score>=75?'score-m':analyse.score>=50?'score-p':'score-n';
  return`<div class="analyse-sec">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <div style="font-size:12px;font-weight:600"><i class="ti ti-chart-bar" aria-hidden="true"></i> Analyse depuis Recrutement TAFINAR</div>
      ${analyse.score?`<span class="card-score ${scoreClass}" style="font-size:11px">${analyse.score}/100 — ${analyse.verdictCourt}</span>`:''}
      ${dateInfo}
    </div>
    <table class="analyse-table">
      <thead><tr><th>Critère</th><th style="text-align:center">Poids</th><th style="text-align:center">Statut</th><th>Commentaire</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    ${verdict?`<div class="verdict-analyse">${verdict}</div>`:''}
  </div>`;
}
let S = {
  tab: 's',
  srcr: 'Mehdi',
  sourceurs: ['Mehdi','Said','Amine'],
  statuts: {Mehdi:[...DEFAULT_STATUTS],Said:[...DEFAULT_STATUTS],Amine:[...DEFAULT_STATUTS]},
  candidates: [],   // localStorage — private per device
  postes: [],       // Supabase — shared
  sharedProfils: [],// Supabase — shared (with pretention)
  sel: new Set(),   // selected for mail
  remHist: [],
  dragId: null,
  colDragIdx: null,
  pView: 'list',
  profilSort: 'nom',
  posteView: 'grid',
  posteSort: 'date',
  trash: [],
};

// ═══════════════════════════════════════
// UTILS
// ═══════════════════════════════════════
function uid(){return 'x'+Math.random().toString(36).substr(2,9)}
function isUUID(s){return /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/.test(s||'')}
function sim(a,b){a=(a||'').toLowerCase().trim();b=(b||'').toLowerCase().trim();if(a===b)return 1;if(a.includes(b)||b.includes(a))return.85;const sa=new Set(a.split(/\s+/));const sb2=new Set(b.split(/\s+/));return[...sa].filter(x=>sb2.has(x)).length/new Set([...sa,...sb2]).size;}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function tryJSON(s,d){if(s===null||s===undefined)return d;try{const r=JSON.parse(s);return(r===null||r===undefined)?d:r;}catch{return d;}}
function gp(id){return S.postes.find(p=>p.id===id);}

let toastTimer;
function showToast(msg,type='ok'){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='toast '+(type||'ok');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{el.className='toast hide';},3500);
}

function showLoader(v){document.getElementById('loader').style.display=v?'flex':'none';}
function updateMailBtn(){
  const btn=document.getElementById('mail-btn');if(!btn)return;
  const n=S.sel.size;
  btn.innerHTML=`<i class="ti ti-mail" aria-hidden="true"></i> Mail récap${n>0?` <strong>(${n})</strong>`:''}`;
  btn.style.opacity=n>0?'1':'.4';
  btn.style.pointerEvents=n>0?'auto':'none';
}

// ═══════════════════════════════════════
// LOCAL STORAGE
// ═══════════════════════════════════════
function saveLocal(){
  try{
    localStorage.setItem('tn_sourceurs',JSON.stringify(S.sourceurs));
    localStorage.setItem('tn_statuts',JSON.stringify(S.statuts));
    localStorage.setItem('tn_remhist',JSON.stringify(S.remHist));

    const rh=localStorage.getItem('tn_remhist');if(rh)S.remHist=tryJSON(rh,[]);

// ═══════════════════════════════════════
// CSV PARSER (handles quoted fields)
// ═══════════════════════════════════════
function parseCSV(text){
  // Remove BOM
  text=text.replace(/^\uFEFF/,'');
  const rows=[];let cur=[];let field='';let inQ=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];const n=text[i+1];
    if(inQ){
      if(c==='"'&&n==='"'){field+='"';i++;}
      else if(c==='"'){inQ=false;}
      else{field+=c;}
    }else{
      if(c==='"'){inQ=true;}
      else if(c===','){cur.push(field);field='';}
      else if(c==='\n'){cur.push(field);field='';if(cur.some(f=>f.trim()))rows.push(cur);cur=[];}
      else if(c!=='\r'){field+=c;}
    }
  }
  if(field)cur.push(field);if(cur.some(f=>f.trim()))rows.push(cur);
  return rows;
}

async function fetchCandidats(){
  const me=getMe();
  const{data,error}=await sb.from('candidats').select('*').order('created_at',{ascending:false});
  if(error)throw error;
  const all=data||[];
  // Restore OWN candidates if localStorage was empty (safety net)
  const myCands=all.filter(r=>r.sourcer===me);
  const myLocalCands=S.candidates.filter(c=>c.sourcer===me&&!c._fromSB);
  if(myLocalCands.length===0&&myCands.length>0){
    // localStorage was wiped - restore from Supabase
    myCands.forEach(r=>{
      if(!S.candidates.find(c=>c.id===r.local_id)){
        S.candidates.push({
          id:r.local_id,
          nom:r.nom||'',trigramme:r.trigramme||'',
          posteId:'',posteTitre:r.poste_titre||'',
          dispo:r.dispo||'',
          mobilite:tryJSON(r.mobilite,r.mobilite?[r.mobilite]:[]),
          pretention:r.pretention||'',
          freelance:r.freelance||'Non',
          remarque:r.remarque||'',
          sourcer:r.sourcer||'',
          statut:r.statut||'',
          score:r.score||null,verdict:r.verdict||null,
          telephone:r.telephone||'',
          sbId:null,cvO:null,cvA:null,analyse:null,
          order:r.order||null,
        });
      }
    });
    // Save restored candidates to localStorage
    saveLocal();
    showToast('Données restaurées depuis Supabase ✅','ok');
  }
  // Inject candidates from other sourceurs (read-only view)
  const others=all.filter(r=>r.sourcer!==me);
  others.forEach(r=>{
    const existing=S.candidates.find(c=>c.id===r.local_id);
    if(!existing){
      S.candidates.push({
        id:r.local_id,
        nom:r.nom||'',trigramme:r.trigramme||'',
        posteId:'',posteTitre:r.poste_titre||'',
        dispo:r.dispo||'',
        mobilite:tryJSON(r.mobilite,r.mobilite?[r.mobilite]:[]),
        pretention:r.pretention||'',
        freelance:r.freelance||'Non',
        remarque:r.remarque||'',
        sourcer:r.sourcer||'',
        statut:r.statut||'',
        score:r.score||null,verdict:r.verdict||null,
        telephone:r.telephone||'',
        sbId:null,cvO:null,cvA:null,analyse:null,
        _fromSB:true,
      });
    }
  });
  // Re-resolve posteId from posteTitre
  S.candidates.forEach(c=>{
    if(!c.posteId&&c.posteTitre){
      const p=S.postes.find(p=>sim(p.titre,c.posteTitre)>0.55);
      if(p)c.posteId=p.id;
    }
  });
}

async function pushPoste(p){
  const payload={
    titre:p.titre,client:p.client,
    lieux:JSON.stringify(p.lieux||[]),
    secteur:p.secteur,urgence:p.urgence,statut:p.statut,
    salaire:p.salaire,experience:p.experience,
    nb_candidats:p.nbCandidats,competences:p.competences,
    description:p.description||'',
  };
  if(isUUID(p.id)){
    const{error}=await sb.from('postes').update(payload).eq('id',p.id);
    if(error)throw error;
  }else{
    const{data,error}=await sb.from('postes').insert(payload).select().single();
    if(error)throw error;
    // Update id in local array
    const idx=S.postes.findIndex(x=>x.id===p.id);
    if(idx>=0)S.postes[idx].id=data.id;
    p.id=data.id;
  }
  localStorage.setItem('tn_postes_cache',JSON.stringify(S.postes));
}

async function uploadCvToStorage(sbId,type,file){
  const safe=file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
  const path=`${sbId}/${type}_${safe}`;
  const{error:upErr}=await sb.storage.from('tafinar-cvs').upload(path,file,{upsert:true,cacheControl:'3600',contentType:file.type||'application/octet-stream'});
  if(upErr)throw upErr;
  const{data:{publicUrl}}=sb.storage.from('tafinar-cvs').getPublicUrl(path);
  const col=type==='o'?{cv_original_url:publicUrl,cv_original_name:file.name}:{cv_anonyme_url:publicUrl,cv_anonyme_name:file.name};
  await sb.from('profils').update(col).eq('id',sbId);
  return{url:publicUrl,name:file.name};
}

async function uploadCvAfterSync(c){
  if(!c.sbId)return;

}

// ── LES PROFILS ──
function rProfils(){
  const sn=document.getElementById('ps-n')?.value||'';
  const sp=document.getElementById('ps-p')?.value||'';
  const st2=document.getElementById('ps-t')?.value||'';
  let list=[...S.sharedProfils];
  if(sn)list=list.filter(c=>c.nom.toLowerCase().includes(sn.toLowerCase()));
  if(sp)list=list.filter(c=>c.posteTitre.toLowerCase().includes(sp.toLowerCase()));
  if(st2)list=list.filter(c=>c.trigramme.toLowerCase().includes(st2.toLowerCase()));
  const isG=S.pView==='grid';
  const sortBy=S.profilSort||'nom';
  if(sortBy==='nom')list.sort((a,b)=>a.nom.localeCompare(b.nom));
  else if(sortBy==='poste')list.sort((a,b)=>(a.posteTitre||'').localeCompare(b.posteTitre||''));
  else if(sortBy==='score')list.sort((a,b)=>(b.score||0)-(a.score||0));
  else if(sortBy==='dispo')list.sort((a,b)=>(a.dispo||'').localeCompare(b.dispo||''));
  const selAll=list.length>0&&list.every(c=>S.sel.has('sb_'+c.sbId));
  const cards=isG?`<div class="profils-grid">${list.map(c=>{
    const isSel=S.sel.has('sb_'+c.sbId);
    const scBadge=c.score?`<span class="card-score ${c.verdict==='Match'?'score-m':c.verdict==='Partiel'?'score-p':'score-n'}">${c.score}/100 ${c.verdict||''}</span>`:'';
    return`<div class="pc${isSel?' sel':''}" style="position:relative" onclick="openSharedEdit('${c.sbId}')">
      <input type="checkbox" class="card-check" ${isSel?'checked':''} onclick="toggleSelSb('${c.sbId}',event)">
      <button onclick="event.stopPropagation();delSharedProfil('${c.sbId}')" style="position:absolute;top:4px;right:4px;background:none;border:none;cursor:pointer;font-size:14px;color:#9ca3af;line-height:1" title="Supprimer">×</button>

  ${list.map(c=>{const isSel=S.sel.has('sb_'+c.sbId);return`<tr class="${isSel?'sel':''}" onclick="openSharedEdit('${c.sbId}')"><td onclick="event.stopPropagation()"><input type="checkbox" ${isSel?'checked':''} onclick="toggleSelSb('${c.sbId}',event)" style="accent-color:var(--green)"></td><td style="font-size:10px;color:#9ca3af;font-weight:600;text-transform:uppercase;letter-spacing:.04em">${c.sourcer}</td><td style="font-weight:600">${esc(c.nom)}</td><td>${c.trigramme}</td><td style="font-size:11px">${esc(c.posteTitre||'—')}</td><td>${c.dispo||'—'}</td><td>${(c.mobilite||[]).join(', ')||'—'}</td><td><span class="ptag ptag-b">${esc(c.pretention)}</span></td><td>${c.freelance}</td><td>${c.score?`<span class="card-score ${c.verdict==='Match'?'score-m':c.verdict==='Partiel'?'score-p':'score-n'}">${c.score}/100</span>`:''}</td></tr>`;}).join('')}

// ═══════════════════════════════════════
// SÉLECTION + MAIL
// ═══════════════════════════════════════
function toggleSel(id,e){if(e)e.stopPropagation();if(S.sel.has(id))S.sel.delete(id);else S.sel.add(id);updateMailBtn();render();}
function toggleSelSb(sbId,e){if(e)e.stopPropagation();const k='sb_'+sbId;if(S.sel.has(k))S.sel.delete(k);else S.sel.add(k);updateMailBtn();render();}
function toggleSelAllSb(cb,ids){ids.forEach(id=>{const k='sb_'+id;if(cb.checked)S.sel.add(k);else S.sel.delete(k);});updateMailBtn();render();}

function getSelData(){
  const result=[];
  S.sel.forEach(key=>{
    if(key.startsWith('sb_')){
      const sbId=key.slice(3);
      const p=S.sharedProfils.find(x=>x.sbId===sbId);
      if(p)result.push({nom:p.nom,trigramme:p.trigramme,posteTitre:p.posteTitre,dispo:p.dispo,mobilite:p.mobilite,pretention:p.pretention,freelance:p.freelance,remarque:p.remarque,score:p.score,verdict:p.verdict,_sbId:sbId});
    }else{
      const c=S.candidates.find(x=>x.id===key);
      if(c){const p=gp(c.posteId);result.push({nom:c.nom,trigramme:c.trigramme,posteTitre:p?p.titre:(c.posteTitre||''),dispo:c.dispo,mobilite:c.mobilite,pretention:c.pretention,freelance:c.freelance,remarque:c.remarque,score:c.score,verdict:c.verdict,_id:c.id});}
    }
  });
  return result;
}

function getMailData(){
  const sel=getSelData();
  const byPoste={};const ordre=[];
  sel.forEach(c=>{const k=c.posteTitre||'Poste non défini';if(!byPoste[k]){byPoste[k]=[];ordre.push(k);}byPoste[k].push(c);});
  return{sel,byPoste,ordre};
}

function genMailHTML(dest){
  const{byPoste,ordre}=getMailData();
  if(!ordre.length)return'<p style="color:#9ca3af">(Aucun profil sélectionné)</p>';
  let html=`<p>Bonjour Monsieur ${esc(dest||'ABABOU')}</p><p>&nbsp;</p>`;
  html+=`<p>Ci-joints les <strong>CI</strong> concernant les postes suivant :</p>`;
  html+=`<ul>`;ordre.forEach(p=>{html+=`<li>${esc(p)}</li>`;});html+=`</ul><p>&nbsp;</p>`;
  ordre.forEach(p=>{
    html+=`<p><strong><em>${esc(p)}</em></strong></p><p>&nbsp;</p>`;
    byPoste[p].forEach(c=>{
      html+=`<p><strong>${esc(c.nom)}</strong></p>`;
      html+=`<p>Profil : ${esc(c.trigramme||'—')}</p>`;
      html+=`<p>Disponible : ${esc(c.dispo||'—')}</p>`;
      html+=`<p>Prétention salariale : ${esc(c.pretention||'—')}</p>`;
      html+=`<p>Mobilité : ${esc((c.mobilite||[]).join(', ')||'—')}</p>`;
      html+=`<p>Remarque : ${esc(c.remarque||'—')}</p>`;
      html+=`<p>Freelance : ${esc(c.freelance)}</p><p>&nbsp;</p>`;
    });
  });
  return html;
}

function genMailText(dest){
  const{byPoste,ordre}=getMailData();
  if(!ordre.length)return'(Aucun profil sélectionné)';
  let t=`Bonjour Monsieur ${dest||'ABABOU'}\n\nCi-joints les CI concernant les postes suivant :\n\n`;
  ordre.forEach(p=>{t+=`* ${p}\n`;});
  t+='\n\n';
  ordre.forEach(p=>{
    t+=`${p}\n\n`;
    byPoste[p].forEach(c=>{
      t+=`${c.nom}\nProfil : ${c.trigramme||'—'}\nDisponible : ${c.dispo||'—'}\nPrétention salariale : ${c.pretention||'—'}\nMobilité : ${(c.mobilite||[]).join(', ')||'—'}\nRemarque : ${c.remarque||'—'}\nFreelance : ${c.freelance}\n\n`;
    });
  });
  return t.trim();
}

function refreshMail(){
  const d=document.getElementById('mail-dest')?.value||'ABABOU';
  const el=document.getElementById('mail-prev');
  if(el)el.innerHTML=genMailHTML(d);
}

function copyMailText(){
  const d=document.getElementById('mail-dest')?.value||'ABABOU';
  navigator.clipboard.writeText(genMailText(d)).then(()=>showToast('Texte copié !','ok')).catch(()=>{});
}

function copyMailFormatted(){
  const d=document.getElementById('mail-dest')?.value||'ABABOU';
  const html=genMailHTML(d);
  // Copy as HTML — pastes with formatting into Outlook
  const temp=document.createElement('div');
  temp.style.cssText='position:fixed;top:-9999px;left:-9999px;opacity:0';
  temp.innerHTML=html;temp.contentEditable='true';
  document.body.appendChild(temp);
  const range=document.createRange();range.selectNodeContents(temp);
  const sel=window.getSelection();sel.removeAllRanges();sel.addRange(range);
  try{document.execCommand('copy');showToast('Mis en presse-papiers — colle dans Outlook','ok');}
  catch(e){copyMailText();}
  sel.removeAllRanges();document.body.removeChild(temp);
}

function ouvrirOutlook(){
  const dest=document.getElementById('mail-dest')?.value||'ABABOU';
  const subject=document.getElementById('mail-subject')?.value||'Candidatures — Profils TAFINAR';
  const body=genMailText(dest);
  const a=document.createElement('a');
  a.href=`mailto:?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  a.style.display='none';document.body.appendChild(a);a.click();
  setTimeout(()=>{try{document.body.removeChild(a);}catch(e){}},200);
}

function dlTousCVs(){
  const sel=getSelData();
  const localCVs=[];
  const supabaseCVs=[];

  sel.forEach(c=>{
    const local=S.candidates.find(x=>x.id===c._id||(c._sbId&&x.sbId===c._sbId));
    if(local){
      if(local.cvO&&local.cvO.data)
        localCVs.push({nom:local.nom||local.trigramme||'?',label:'CV original',data:local.cvO.data,name:local.cvO.name||'CV_original.pdf'});
      if(local.cvA&&local.cvA.data)
        localCVs.push({nom:local.nom||local.trigramme||'?',label:'CV anonymisé',data:local.cvA.data,name:local.cvA.name||'CV_anonyme.pdf'});
      if(local.cvOriginalUrl&&!(local.cvO&&local.cvO.data))
        supabaseCVs.push({nom:local.nom||local.trigramme||'?',label:'CV original',url:local.cvOriginalUrl});
      if(local.cvAnonymeUrl&&!(local.cvA&&local.cvA.data))
        supabaseCVs.push({nom:local.nom||local.trigramme||'?',label:'CV anonymisé',url:local.cvAnonymeUrl});
    } else {
      const shared=S.sharedProfils.find(x=>x.sbId===c._sbId);
      if(shared){
        if(shared.cvOriginalUrl) supabaseCVs.push({nom:shared.nom||shared.trigramme||'?',label:'CV original',url:shared.cvOriginalUrl});
        if(shared.cvAnonymeUrl) supabaseCVs.push({nom:shared.nom||shared.trigramme||'?',label:'CV anonymisé',url:shared.cvAnonymeUrl});
      }
    }
  });

  if(localCVs.length===0&&supabaseCVs.length===0){
    showToast('Aucun CV joint pour ces profils','warn');
    return;
  }

  // ── Build popup ──
  const existing=document.getElementById('cv-dl-popup');if(existing)existing.remove();
  const popup=document.createElement('div');
  popup.id='cv-dl-popup';
  popup.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:10001;display:flex;align-items:center;justify-content:center';

  const totalCount=localCVs.length+supabaseCVs.length;

  // Local CVs section
  // Store localCVs on window for indexed access — avoids any escaping issue
  window._dlLocalCVs=localCVs;

  const localRows=localCVs.map((cv,i)=>
    `<div style="display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 0;border-bottom:1px solid #e5e7eb">
      <div>
        <div style="font-weight:600;font-size:13px;color:#111">${cv.nom}</div>
        <div style="font-size:11px;color:#6b7280">${cv.label} — <span style="color:#9ca3af">${cv.name}</span></div>
      </div>
      <button onclick="dlLocalCv(${i},this)"
        style="display:inline-flex;align-items:center;gap:5px;padding:6px 14px;background:#0d3b6e;color:#fff;border:none;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0">
        <i class="ti ti-download" aria-hidden="true"></i> Télécharger
      </button>
    </div>`
  ).join('');

  // Supabase CVs section
  const sbRows=supabaseCVs.map((cv,i)=>
    `<div style="display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 0;border-bottom:1px solid #fde68a${i===supabaseCVs.length-1?';border-bottom:none':''}">
      <div>
        <div style="font-weight:600;font-size:13px;color:#92400e">${cv.nom}</div>
        <div style="font-size:11px;color:#b45309">${cv.label}</div>
      </div>
      <a href="${cv.url}" target="_blank"
        style="display:inline-flex;align-items:center;gap:5px;padding:6px 14px;background:#854d0e;color:#fff;border-radius:7px;font-size:12px;font-weight:600;text-decoration:none;white-space:nowrap;flex-shrink:0">
        <i class="ti ti-external-link" aria-hidden="true"></i> Ouvrir
      </a>
    </div>`
  ).join('');

  popup.innerHTML=`
    <div style="background:#fff;border-radius:14px;padding:0;width:520px;max-width:95vw;max-height:85vh;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.2);display:flex;flex-direction:column">
      <div style="padding:20px 24px 16px;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;justify-content:space-between;flex-shrink:0">
        <div>
          <div style="font-size:16px;font-weight:700;color:#111">CVs sélectionnés</div>
          <div style="font-size:12px;color:#6b7280;margin-top:2px">${totalCount} CV(s) pour ${sel.length} profil(s)</div>
        </div>
        <button onclick="document.getElementById('cv-dl-popup').remove()"
          style="background:none;border:none;font-size:22px;cursor:pointer;color:#9ca3af;line-height:1;padding:4px">×</button>
      </div>
      <div style="overflow-y:auto;padding:16px 24px;flex:1">
        ${localCVs.length>0?`
          <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#0d3b6e;margin-bottom:8px;display:flex;align-items:center;gap:6px">
            <i class="ti ti-device-floppy" aria-hidden="true"></i> Sur ton ordinateur (${localCVs.length})
          </div>
          ${localRows}
          ${supabaseCVs.length>0?'<div style="height:16px"></div>':''}
        `:''}
        ${supabaseCVs.length>0?`
          <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#92400e;margin-bottom:8px;display:flex;align-items:center;gap:6px;margin-top:${localCVs.length>0?'4px':'0'}">
            <i class="ti ti-cloud" aria-hidden="true"></i> Base commune — s'ouvre dans un onglet (${supabaseCVs.length})
          </div>
          <div style="background:#fef9c3;border:1px solid #fde68a;border-radius:8px;padding:10px 12px">
            ${sbRows}
          </div>
        `:''}
      </div>
      <div style="padding:14px 24px;border-top:1px solid #e5e7eb;flex-shrink:0;display:flex;justify-content:flex-end">

          Fermer
        </button>
      </div>
    </div>`;

  document.body.appendChild(popup);
  popup.addEventListener('click',e=>{if(e.target===popup)popup.remove();});
}

function buildPSDrop(matches){
  const drop=document.getElementById('ps-drop');const warn=document.getElementById('ps-warn');
  if(!drop)return;
  if(!matches.length){
    drop.style.display='none';
    if(warn){warn.textContent='Aucun poste trouvé.';warn.style.display='block';}
    return;
  }
  if(warn)warn.style.display='none';
  drop.innerHTML=matches.map(p=>`<div class="sug-item" onmousedown="event.preventDefault()" onclick="selPoste('${p.id}','${p.titre.replace(/'/g,"\\'").replace(/"/g,'&quot;')}')"><div class="sug-t">${esc(p.titre)}</div><div class="sug-m">${esc(p.client||'')} ${(p.lieux||[]).join(', ')}</div></div>`).join('');
  drop.style.display='block';
}
function filtPSAll(){
  // Show all postes on focus (most recent first)
  const src=[...S.postes];
  if(!src.length)return;
  buildPSDrop(src.slice(0,10));
}
function filtPS(){
  const val=(document.getElementById('f-ps')?.value||'').trim();
  const drop=document.getElementById('ps-drop');const warn=document.getElementById('ps-warn');
  if(!val){
    // Clear hidden posteId when field is emptied — prevents ghost selection
    const hid=document.getElementById('f-pid');if(hid)hid.value='';
    if(drop)drop.style.display='none';
    if(warn)warn.style.display='none';
    return;
  }
  const matches=[...S.postes].filter(p=>p.titre.toLowerCase().includes(val.toLowerCase())||sim(p.titre,val)>0.3).slice(0,8);
  buildPSDrop(matches);
}
function selPoste(id,titre){const inp=document.getElementById('f-ps');if(inp)inp.value=titre;const hid=document.getElementById('f-pid');if(hid)hid.value=id;const drop=document.getElementById('ps-drop');if(drop)drop.style.display='none';const warn=document.getElementById('ps-warn');if(warn)warn.style.display='none';}
function filtDis(){const val=(document.getElementById('f-dis')?.value||'').toLowerCase();const drop=document.getElementById('dis-drop');if(!drop)return;const m=val?DISPOS.filter(d=>d.toLowerCase().includes(val)):DISPOS;drop.innerHTML=m.map(d=>`<div onmousedown="event.preventDefault()" onclick="selDis('${d}')">${d}</div>`).join('')+`<div onmousedown="event.preventDefault()" onclick="selDisFree()" style="font-style:italic;color:#9ca3af;border-top:1px solid #f3f4f6">Saisie libre...</div>`;drop.style.display='block';}
function selDis(v){const inp=document.getElementById('f-dis');if(inp)inp.value=v;const d=document.getElementById('dis-drop');if(d)d.style.display='none';}
function selDisFree(){const d=document.getElementById('dis-drop');if(d)d.style.display='none';const inp=document.getElementById('f-dis');if(inp){inp.focus();}}
function filtCity(){const val=(document.getElementById('f-city')?.value||'').toLowerCase().trim();const drop=document.getElementById('city-drop');if(!drop||!val){if(drop)drop.style.display='none';return;}const m=VILLES.filter(v=>v.toLowerCase().startsWith(val)).slice(0,6);if(!m.length){drop.style.display='none';return;}drop.innerHTML=m.map(v=>`<div onmousedown="event.preventDefault()" onclick="addCity('${v}')">${v}</div>`).join('');drop.style.display='block';}
function addCity(v){const cont=document.getElementById('mob-tags');const inp=document.getElementById('f-city');const drop=document.getElementById('city-drop');if(cont){const ex=[...cont.querySelectorAll('.tg')].map(el=>el.childNodes[0].textContent.trim());if(!ex.includes(v)){const tg=document.createElement('div');tg.className='tg';tg.innerHTML=`${esc(v)}<span class="tg-x" onclick="this.parentElement.remove()">×</span>`;cont.appendChild(tg);}}if(inp)inp.value='';if(drop)drop.style.display='none';}
function cityKey(e){if(e.key==='Enter'){e.preventDefault();const v=(document.getElementById('f-city')?.value||'').trim();if(v)addCity(v);}}
function filtRem(){const val=(document.getElementById('f-rem')?.value||'').toLowerCase();const drop=document.getElementById('rem-drop');if(!drop)return;const hist=S.remHist.filter(r=>!val||r.toLowerCase().includes(r));if(!hist.length){drop.style.display='none';return;}drop.innerHTML=hist.slice(0,8).map(r=>`<div onmousedown="event.preventDefault()" onclick="selRem(this)">${esc(r)}</div>`).join('');drop.style.display='block';}

function fCvUp(type,input){if(!input.files[0])return;const f=input.files[0];eCVFiles[type]=f;const r=new FileReader();r.onload=e=>{eCV[type]={name:f.name,data:e.target.result};const lbl=document.getElementById(type==='o'?'cvol':'cval');if(lbl)lbl.textContent=f.name;const act=document.getElementById(type==='o'?'cvo-act':'cva-act');if(act)act.style.display='flex';const up=lbl?.parentElement;if(up)up.classList.add('has');};r.readAsDataURL(f);}

function chkDupC(){const val=(document.getElementById('f-nom')?.value||'').trim();const el=document.getElementById('dup-c');if(!el||val.length<3){if(el)el.innerHTML='';return;}const dups=S.candidates.filter(c=>sim(c.nom,val)>0.7);el.innerHTML=dups.length?`<div class="warn-txt">Profil similaire : ${dups.map(d=>esc(d.nom)).join(', ')}</div>`:'';}

  if(!posteId){
    if(!posteSaisi){
      showToast('Veuillez indiquer un poste','warn');
      const el=document.getElementById('f-ps');if(el){el.style.border='1.5px solid #dc2626';el.focus();setTimeout(()=>{if(el)el.style.border='';},2000);}
      return;
    }

    // Capture current form state before any popup
    const captureState=()=>({
      editId:id||null,
      nom:document.getElementById('f-nom')?.value||'',
      trigramme:document.getElementById('f-tri')?.value||'',
      dispo:document.getElementById('f-dis')?.value||'',
      pretention:document.getElementById('f-pret')?.value||'',
      freelance:document.getElementById('f-free')?.value||'Non',
      sourcer:document.getElementById('f-src')?.value||S.srcr,
      remarque:document.getElementById('f-rem')?.value||'',
      mobilite:[...document.querySelectorAll('#mob-tags .tg')].map(el=>el.childNodes[0].textContent.trim()),
      posteSearch:posteSaisi,
      posteId:'',
      cvO:eCV.o,cvA:eCV.a,
    });

    // Check for similar existing poste
    const similar=S.postes.filter(p=>sim(p.titre,posteSaisi)>0.6);

    if(similar.length){
      const action=await new Promise(resolve=>{
        const existing=document.getElementById('poste-check-popup');if(existing)existing.remove();
        const popup=document.createElement('div');
        popup.id='poste-check-popup';
        popup.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:10000;display:flex;align-items:center;justify-content:center';
        popup.innerHTML=`
          <div style="background:#fff;border-radius:12px;padding:24px;width:480px;max-width:95vw;box-shadow:0 8px 32px rgba(0,0,0,.2)">
            <div style="font-size:15px;font-weight:700;color:#111;margin-bottom:6px;display:flex;align-items:center;gap:8px">
              <span style="font-size:20px">🔍</span> Poste similaire trouvé
            </div>
            <div style="font-size:13px;color:#6b7280;margin-bottom:16px">
              Tu as saisi <strong style="color:#111">"${posteSaisi}"</strong>. Un poste similaire existe déjà :
            </div>
            <div style="background:#f0f9ff;border:1px solid #bae6fd;border-radius:8px;padding:12px 14px;margin-bottom:16px">
              <div style="font-weight:600;color:#0369a1;font-size:13px">${esc(similar[0].titre)}</div>
              ${similar[0].client?`<div style="font-size:11px;color:#6b7280;margin-top:2px">${esc(similar[0].client)}</div>`:''}
            </div>
            <div style="font-size:12px;color:#374151;margin-bottom:16px">Est-ce le même poste ?</div>
            <div style="display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap">
              <button id="pcp-new" style="padding:8px 16px;border:1.5px solid #e5e7eb;border-radius:8px;background:#fff;font-size:13px;cursor:pointer;font-family:inherit;color:#374151">
                Non — créer <strong>"${posteSaisi.length>25?posteSaisi.slice(0,25)+'…':posteSaisi}"</strong>
              </button>
              <button id="pcp-use" style="padding:8px 16px;background:#0d3b6e;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">
                ✓ Oui — utiliser ce poste
              </button>
            </div>
          </div>`;
        document.body.appendChild(popup);
        document.getElementById('pcp-use').onclick=()=>{popup.remove();resolve('used');};
        document.getElementById('pcp-new').onclick=()=>{popup.remove();resolve('create');};
      });

      if(action==='used'){
        // Set the similar poste and re-run saveC
        const hid=document.getElementById('f-pid');if(hid)hid.value=similar[0].id;
        const ps=document.getElementById('f-ps');if(ps)ps.value=similar[0].titre;
        await saveC(id);return;
      }
      // action === 'create' — save state, create poste, reopen form
      pendingCandidatState=captureState();
      const newP={id:uid(),titre:posteSaisi,client:'',secteur:'',lieux:[],urgence:'',statut:'🟢 Actif',salaire:'',experience:'',nbCandidats:'',competences:'',description:''};
      S.postes.push(newP);
      try{await pushPoste(newP);}catch(e){console.error('pushPoste:',e);}
      localStorage.setItem('tn_postes_cache',JSON.stringify(S.postes));
      showToast('Poste "'+posteSaisi+'" créé','ok');
      reopenCandidatFormWithState(newP.id,newP.titre);
      return;
    }

    // No similar — ask to create directly
    const confirmed=await new Promise(resolve=>{
      const existing=document.getElementById('poste-check-popup');if(existing)existing.remove();
      const popup=document.createElement('div');
      popup.id='poste-check-popup';
      popup.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:10000;display:flex;align-items:center;justify-content:center';
      popup.innerHTML=`
        <div style="background:#fff;border-radius:12px;padding:24px;width:440px;max-width:95vw;box-shadow:0 8px 32px rgba(0,0,0,.2)">
          <div style="font-size:15px;font-weight:700;color:#111;margin-bottom:8px;display:flex;align-items:center;gap:8px">
            <span style="font-size:20px">📋</span> Nouveau poste
          </div>
          <div style="font-size:13px;color:#6b7280;margin-bottom:16px">
            Le poste <strong style="color:#111">"${posteSaisi}"</strong> n'existe pas encore dans la liste.<br>
            Voulez-vous le créer automatiquement ?
          </div>
          <div style="display:flex;gap:8px;justify-content:flex-end">
            <button id="pcp-cancel" style="padding:8px 16px;border:1.5px solid #e5e7eb;border-radius:8px;background:#fff;font-size:13px;cursor:pointer;font-family:inherit;color:#374151">Annuler</button>
            <button id="pcp-create" style="padding:8px 16px;background:#0e7c3a;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">
              ✓ Créer le poste
            </button>
          </div>
        </div>`;
      document.body.appendChild(popup);
      document.getElementById('pcp-create').onclick=()=>{popup.remove();resolve(true);};
      document.getElementById('pcp-cancel').onclick=()=>{popup.remove();resolve(false);};
    });
    if(!confirmed)return;
    // Save state, create poste, reopen form
    pendingCandidatState=captureState();
    const newP={id:uid(),titre:posteSaisi,client:'',secteur:'',lieux:[],urgence:'',statut:'🟢 Actif',salaire:'',experience:'',nbCandidats:'',competences:'',description:''};
    S.postes.push(newP);
    try{await pushPoste(newP);}catch(e){console.error('pushPoste:',e);}
    localStorage.setItem('tn_postes_cache',JSON.stringify(S.postes));
    showToast('Poste "'+posteSaisi+'" créé','ok');
    reopenCandidatFormWithState(newP.id,newP.titre);
    return;
  }
  const rem=(document.getElementById('f-rem')?.value||'').trim();
  if(rem&&!S.remHist.includes(rem))S.remHist.unshift(rem);
  if(S.remHist.length>20)S.remHist=S.remHist.slice(0,20);
  const mobilite=[...document.querySelectorAll('#mob-tags .tg')].map(el=>el.childNodes[0].textContent.trim());
  const sourcer=isAdmin()?(document.getElementById('f-src')?.value||getMe()):getMe();
  const data={nom,trigramme:(document.getElementById('f-tri')?.value||'').trim(),posteId,dispo:(document.getElementById('f-dis')?.value||'').trim(),mobilite,pretention:(document.getElementById('f-pret')?.value||'').trim(),freelance:document.getElementById('f-free')?.value||'Non',sourcer,remarque:rem,telephone:(document.getElementById('f-tel')?.value||'').trim(),cvO:eCV.o,cvA:eCV.a,analyse:pendingAnalyse};
  pendingAnalyse=null;
  let c;
  if(id){c=S.candidates.find(x=>x.id===id);if(c)Object.assign(c,data);}
  else{const sts=S.statuts[sourcer]||[...DEFAULT_STATUTS];c={id:uid(),statut:sts[0],sbId:null,score:null,verdict:null,...data};S.candidates.push(c);}
  // Clear _fromSB flag — candidate is now owned/edited locally
  if(c._fromSB) delete c._fromSB;
  saveLocal();
  clearDraft();
  closeM();render();
  // Sync candidat to shared candidats table
  syncCandidatToSB(c).catch(e=>console.warn('syncCandidatToSB:',e));
  // Sync to Supabase if has pretention
  if(data.pretention&&data.pretention.trim()){
    try{
      await syncCandidatProfil(c);
      await uploadCvAfterSync(c);
      saveLocal();
      await fetchProfils();
      showToast('Profil synchronisé','ok');
    }catch(e){console.error(e);showToast('Sync Supabase échoué — données sauvegardées localement','warn');}
  }
}

function dlCvShared(sbId,type){
  const local=S.candidates.find(x=>x.sbId===sbId);if(!local)return;
  const cv=type==='o'?local.cvO:local.cvA;if(!cv)return;
  const a=document.createElement('a');a.href=cv.data;a.download=cv.name;a.click();
}

function uploadCvShared(sbId,type,input){
  const local=S.candidates.find(x=>x.sbId===sbId);if(!local||!input.files[0])return;
  const f=input.files[0];const r=new FileReader();
  r.onload=e=>{
    if(type==='o')local.cvO={name:f.name,data:e.target.result};
    else local.cvA={name:f.name,data:e.target.result};
    saveLocal();openProfilView(sbId);
  };r.readAsDataURL(f);
}

function genBlocMail(c){const p=gp(c.posteId);return`**${c.nom}**\nProfil : ${c.trigramme||'—'}\nDisponible : ${c.dispo||'—'}\nPrétention salariale : ${c.pretention||'—'}\nMobilité : ${(c.mobilite||[]).join(', ')||'—'}\nFreelance : ${c.freelance}${c.remarque?'\nRemarque : '+c.remarque:''}\nPoste ciblé : ${p?p.titre:'—'}`;}
function cpyMail(id){const c=S.candidates.find(x=>x.id===id);if(!c)return;navigator.clipboard.writeText(genBlocMail(c)).then(()=>{const el=document.getElementById('bm-prev');if(el){el.style.background='#dcfce7';setTimeout(()=>{if(el)el.style.background='';},700);}}).catch(()=>{});}
function vCvUp(id,type,input){const c=S.candidates.find(x=>x.id===id);if(!c||!input.files[0])return;const f=input.files[0];const r=new FileReader();r.onload=e=>{if(type==='o')c.cvO={name:f.name,data:e.target.result};else c.cvA={name:f.name,data:e.target.result};saveLocal();openView(id);};r.readAsDataURL(f);
if(c.sbId){uploadCvToStorage(c.sbId,type,f).then(()=>{fetchProfils();}).catch(e=>console.error('CV storage:',e));}
}
function vCvDl(id,type){const c=S.candidates.find(x=>x.id===id);const cv=type==='o'?c?.cvO:c?.cvA;if(!cv)return;const a=document.createElement('a');a.href=cv.data;a.download=cv.name;a.click();}
function vCvRm(id,type){const c=S.candidates.find(x=>x.id===id);if(!c)return;if(type==='o')c.cvO=null;else c.cvA=null;saveLocal();openView(id);}

async function saveP(id){
  const titre=(document.getElementById('p-tit')?.value||'').trim();
  if(!titre){alert('Le titre est obligatoire.');return;}
  const conf=document.getElementById('p-dup-ok');const warn=document.getElementById('dup-p')?.innerHTML||'';
  if(warn&&conf&&!conf.checked){alert("Veuillez confirmer que ce poste n'existe pas déjà.");return;}
  const lieux=[...document.querySelectorAll('#p-lieu-tags .tg')].map(el=>el.childNodes[0].textContent.trim());
  const data={titre,client:(document.getElementById('p-cli')?.value||'').trim(),secteur:(document.getElementById('p-sec')?.value||'').trim(),lieux,urgence:document.getElementById('p-urg')?.value||'',statut:document.getElementById('p-sta')?.value||'🟢 Actif',salaire:(document.getElementById('p-sal')?.value||'').trim(),experience:(document.getElementById('p-exp')?.value||'').trim(),nbCandidats:(document.getElementById('p-nb')?.value||'').trim(),competences:(document.getElementById('p-comp')?.value||'').trim(),description:(document.getElementById('p-desc')?.value||'').trim()};
  let targetPoste;
  if(isUUID(id)){Object.assign(S.postes.find(x=>x.id===id),data);targetPoste=S.postes.find(x=>x.id===id);}
  else{targetPoste={id:uid(),...data};S.postes.unshift(targetPoste);}
  const hasPending=!!pendingCandidatState;
  closeM();render();
  try{
    await pushPoste(targetPoste);
    showToast('Poste sauvegardé','ok');
    // Re-open candidate form if we came from it
    if(hasPending){
      await fetchPostes(); // refresh poste list first
      reopenCandidatFormWithState(targetPoste.id, targetPoste.titre);
    }
  }catch(e){
    console.error(e);showToast('Erreur sauvegarde Supabase — poste en cache local','warn');
    if(hasPending)reopenCandidatFormWithState(targetPoste.id, targetPoste.titre);
  }
}

function moveCard(id,dir){
  const c=S.candidates.find(x=>x.id===id);
  if(!c)return;
  // Get sorted column
  const col=S.candidates
    .filter(x=>x.sourcer===c.sourcer&&x.statut===c.statut)
    .sort((a,b)=>(a.order??9999)-(b.order??9999));
  // Assign order to all cards that don't have one yet
  // Initialize order for ALL candidates in this col (not just undefined ones)
  col.forEach((x,i)=>{x.order=i;});
  const i=col.findIndex(x=>x.id===id);
  const j=dir==='up'?i-1:i+1;
  if(j<0||j>=col.length)return;
  // Swap order values
  const tmp=col[i].order;
  col[i].order=col[j].order;
  col[j].order=tmp;
  saveLocal();render();
}

function mapFreelance(val){
  if(!val||val==='nan'||val.trim()==='')return'Non';
  const v=val.trim().toLowerCase();
  if(v==='oui'||v==='yes'||v==='true')return'Oui';
  if(v==='non'||v==='no'||v==='false')return'Non';
  if(v.startsWith('cdi')&&v.length<6)return'CDI';
  if(v.includes('cdi')&&v.length<20)return'CDI';
  return'À valider';
}

function mapStatut(raw,sourcer){
  if(!raw)return null;
  const s=raw.trim();
  const map={
    '📦 Archiver':'📦 Archiver','📦Archiver':'📦 Archiver',
    '✅ Envoyer':'✅ À envoyer','✅Envoyer':'✅ À envoyer','✅ À envoyer':'✅ À envoyer',
    '📤 À appeler':'📤 À appeler','📤 A appeler':'📤 À appeler','📤A appeler':'📤 À appeler',
    '⏳ En attente':'⏳ En attente',
    '🆕 Nouveau':'🆕 Nouveau',
  };
  if(map[s])return map[s];
  // Statuts perso Notion (Profils de X) → premier statut du sourceur
  return(S.statuts[sourcer]||[...DEFAULT_STATUTS])[0];
}

function parseRow(row,sourcer){
  const nom=(row['Nom et prénom']||row['nom']||'').trim();
  if(!nom)return null;
  const pr=(row['Poste ciblé']||row['poste']||'').replace(/\s{0,5}\(https?:\/\/[^)]+\)/g,'').trim();
  const found=S.postes.find(p=>sim(p.titre,pr)>0.55);
  const mobilite=[];
  const mob=(row['Mobilité']||'').trim();
  const lieu=(row['Lieu']||'').trim();
  if(mob)mobilite.push(mob);else if(lieu)mobilite.push(lieu);
  const srcRaw=(row['Sourcer']||'').trim();
  const srcMap={'Ormani':'Mehdi','Tafinar':'Mehdi','said.aabadi':'Said'};
  const src=srcMap[srcRaw]||(S.sourceurs.includes(srcRaw)?srcRaw:sourcer);
  const statut=mapStatut(row['Statut interne']||'',src)||(S.statuts[src]||[...DEFAULT_STATUTS])[0];
  return{
    id:uid(),nom,
    trigramme:(row['Trigramme']||'').trim(),
    posteId:found?found.id:'',posteTitre:pr,
    dispo:(row['Disponibilité']||'').trim(),
    mobilite,
    pretention:(row['Prétention salariale']||'').trim(),
    freelance:mapFreelance(row['Freelance']||''),
    remarque:(row['Remarque profil']||'').trim(),
    sourcer:src,statut,
    sbId:null,score:null,verdict:null,cvO:null,cvA:null,
  };
}

// Global pending import state
let _importPending = null;

function impCSV(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{
    const rows=parseCSV(ev.target.result);
    if(rows.length<2){showToast('Fichier CSV vide ou invalide','warn');return;}
    const headers=rows[0].map(h=>h.trim());
    const dataRows=rows.slice(1).map(vals=>{
      const obj={};headers.forEach((h,j)=>obj[h]=(vals[j]||'').trim());return obj;
    }).filter(row=>(row['Nom et prénom']||row['nom']||'').trim());
    const nouveaux=[];const doublons=[];
    dataRows.forEach(row=>{
      const parsed=parseRow(row,getMe()||S.srcr);
      if(!parsed)return;
      const existing=S.candidates.find(c=>sim(c.nom,parsed.nom)>0.88);
      if(existing)doublons.push({parsed,existing});
      else nouveaux.push(parsed);
    });
    _importPending={nouveaux,doublons};
    showImportModal();
  };
  r.readAsText(file,'UTF-8');
}

function toggleAllImport(cb){
  document.querySelectorAll('#import-tbody input[type=checkbox]').forEach(el=>el.checked=cb.checked);
}

function confirmImport(){
  if(!_importPending){closeM();return;}
  const{nouveaux,doublons}=_importPending;
  const dupMode=document.getElementById('dup-mode')?.value||'skip';
  let added=0;

  // Read edited values from each row — inputs are in order: nom, tri, poste, dispo, pret, sourcer
  const readRow=(tr)=>{
    const inputs=[...tr.querySelectorAll('input:not([type="checkbox"])')];
    return{
      nom:(inputs[0]?.value||'').trim(),
      trigramme:(inputs[1]?.value||'').trim(),
      posteTitre:(inputs[2]?.value||'').trim(),
      dispo:(inputs[3]?.value||'').trim(),
      pretention:(inputs[4]?.value||'').trim(),
      sourcer:(inputs[5]?.value||'').trim(),
    };
  };

  const rows=[...document.querySelectorAll('#import-tbody tr')];
  let newIdx=0;let dupIdx=0;

  rows.forEach(tr=>{
    const cb=tr.querySelector('input[data-type="new"],input[data-type="dup"]');
    if(!cb)return;
    const edited=readRow(tr);
    if(cb.dataset.type==='new'){
      if(cb.checked&&nouveaux[newIdx]){
        const c={...nouveaux[newIdx],...edited};
        // Re-resolve posteId from edited posteTitre
        const found=S.postes.find(p=>sim(p.titre,edited.posteTitre)>0.55);
        c.posteId=found?found.id:'';
        S.candidates.push(c);added++;
      }
      newIdx++;
    } else {
      if(cb.checked&&doublons[dupIdx]){
        const parsed={...doublons[dupIdx].parsed,...edited};
        const found=S.postes.find(p=>sim(p.titre,edited.posteTitre)>0.55);
        parsed.posteId=found?found.id:'';
        if(dupMode==='skip'){/* skip */}
        else if(dupMode==='add'){S.candidates.push(parsed);added++;}
        else if(dupMode==='replace'){
          const ri=S.candidates.findIndex(c=>sim(c.nom,doublons[dupIdx].parsed.nom)>0.88);
          if(ri>=0){const old=S.candidates[ri];S.candidates[ri]={...parsed,id:old.id,sbId:old.sbId,cvO:old.cvO,cvA:old.cvA};}
          else S.candidates.push(parsed);
          added++;
        }
      }
      dupIdx++;
    }
  });

  _importPending=null;
  saveLocal();
  // Sync all newly added candidates to Supabase
  S.candidates.filter(c=>!c._fromSB).forEach(c=>syncCandidatToSB(c).catch(()=>{}));
  closeM();render();
  showToast(added+' profil(s) importé(s)','ok');
}
function impCSVPostes(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=async ev=>{
    const lines=ev.target.result.split('\n');if(lines.length<2)return;
    const headers=lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,''));
    const rows=[];for(let i=1;i<lines.length;i++){if(!lines[i].trim())continue;const vals=lines[i].split(',').map(v=>v.trim().replace(/^"|"$/g,''));const obj={};headers.forEach((h,j)=>obj[h]=vals[j]||'');rows.push(obj);}
    let added=0;
    for(const row of rows){
      const titre=row['Nom complet']||row['titre']||'';if(!titre)return;
      if(S.postes.some(p=>sim(p.titre,titre)>0.8))continue;
      const np={id:uid(),titre,client:row['🏢 Client']||'',lieux:[row['📍 Lieu']||''].filter(Boolean),secteur:row["🏭 Secteur d'activité"]||'',urgence:row['⚠️ Urgence']||'',statut:'🟢 Actif',salaire:'',experience:'',nbCandidats:'',competences:'',description:''};
      S.postes.unshift(np);
      try{await pushPoste(np);}catch(e){console.error(e);}
      added++;
    }
    render();showToast(`${added} poste(s) importé(s)`,'ok');
  };r.readAsText(file,'UTF-8');
}

function handleURLParams(){
  const params=new URLSearchParams(window.location.search);
  const action=params.get('action');
  if(!action)return;
  // Nettoyer l'URL
  window.history.replaceState({},'',window.location.pathname);

  if(action==='new_profil'){
    // Pré-remplir le formulaire candidat
    setTimeout(()=>{
      openForm(null);
      setTimeout(()=>{
        const fn=document.getElementById('f-nom');if(fn)fn.value=decodeURIComponent(params.get('nom')||'');
        const ft=document.getElementById('f-tri');if(ft)ft.value=decodeURIComponent(params.get('trigramme')||'');
        const fd=document.getElementById('f-dis');if(fd)fd.value=decodeURIComponent(params.get('dispo')||'');
        const fp=document.getElementById('f-pret');if(fp)fp.value=decodeURIComponent(params.get('pretention')||'');
        // Score et verdict
        const score=params.get('score');const verdict=params.get('verdict');
        // Recherche du poste
        const posteNom=decodeURIComponent(params.get('poste')||'');
        if(posteNom){
          const fi=document.getElementById('f-ps');if(fi)fi.value=posteNom;
          const match=S.postes.find(p=>sim(p.titre,posteNom)>0.7);
          if(match){const hid=document.getElementById('f-pid');if(hid)hid.value=match.id;}
          else filtPS();
        }
        // Stocker score/verdict pour save
        if(score)window._pendingScore={score:parseInt(score),verdict:verdict||''};
      },100);
    },300);
  }

  if(action==='new_poste'){
    setTimeout(()=>{
      openPosteForm(null);
      setTimeout(()=>{
        const pt=document.getElementById('p-tit');if(pt)pt.value=decodeURIComponent(params.get('titre')||'');
        const pd=document.getElementById('p-desc');if(pd)pd.value=decodeURIComponent(params.get('description')||'');
        const pc=document.getElementById('p-cli');if(pc)pc.value=decodeURIComponent(params.get('client')||'');
        chkDupP();
      },100);
    },300);
  }
}

  }catch(e){return false;}
}


// ═══════════════════════════════════════
// PREFILL FROM RECRUTEMENT (postMessage)
// ═══════════════════════════════════════
window.addEventListener('message', function(e){
  // Handle poste prefill from Recrutement
  if(e.data&&e.data.type==='tn_poste'){
    const d=e.data.payload;if(!d)return;
    const tryOpenPoste=function(attempt){
      if(S.postes.length>0||attempt>10){
        if(document.querySelector('#mroot .modal'))return;
        openPosteForm(null);
        setTimeout(function(){
          const set=function(id,v){const el=document.getElementById(id);if(el&&v!==undefined)el.value=v;};
          set('p-tit',d.titre);
          set('p-cli',d.client||'');
          set('p-desc',d.description||'');
          if(d.titre)chkDupP();
          showToast('Poste pré-rempli depuis Recrutement TAFINAR','ok');
        },100);
      } else {
        setTimeout(function(){tryOpenPoste(attempt+1);},300);
      }
    };
    tryOpenPoste(0);
    return;
  }
  if(!e.data||e.data.type!=='tn_prefill')return;
  const d=e.data.payload;
  if(!d)return;
  pendingAnalyse=d.analyse||null;
  // Wait for Supabase data to be ready, then open form
  const tryOpen=function(attempt){
    if(S.postes.length||attempt>10){
      // Don't override a form already open
      if(document.querySelector('#mroot .modal')){return;}
      openForm(null);
      setTimeout(function(){
        const set=function(id,v){const el=document.getElementById(id);if(el&&v)el.value=v;};
        set('f-nom',d.nom);
        set('f-tri',d.trigramme);
        set('f-pret',d.pretention);
        set('f-dis',d.dispo);
        if(d.telephone)set('f-tel',d.telephone);
        const fsrc=document.getElementById('f-src');
        if(fsrc)fsrc.value=getWho();
        if(d.poste){
          set('f-ps',d.poste);
          const match=S.postes.find(p=>sim(p.titre,d.poste)>0.6);
          if(match){const hid=document.getElementById('f-pid');if(hid)hid.value=match.id;}
          else filtPS();
        }
        if(d.score){
          const modal=document.querySelector('.modal');
          if(modal){
            const banner=document.createElement('div');
            banner.style.cssText='background:#f0faf4;border:1px solid #86efac;border-radius:6px;padding:6px 10px;font-size:12px;color:#166534;margin-bottom:10px;display:flex;align-items:center;gap:6px';
            banner.innerHTML='<i class="ti ti-chart-bar" aria-hidden="true"></i> Score depuis Recrutement TAFINAR : <strong>'+d.score+'/100 — '+d.verdict+'</strong>';
            modal.insertBefore(banner,modal.firstChild.nextSibling);
          }
        }
        // Clear draft since we have fresh data
        clearDraft();
      },80);
    } else {
      setTimeout(function(){tryOpen(attempt+1);},300);
    }
  };
  tryOpen(0);
});


function dlLocalCv(i, btn){
  const cv=window._dlLocalCVs&&window._dlLocalCVs[i];
  if(!cv)return;
  const a=document.createElement('a');
  a.href=cv.data;
  a.download=cv.name||'CV.pdf';
  a.click();
  btn.innerHTML='<i class="ti ti-check" aria-hidden="true"></i> Téléchargé';
  btn.style.background='#166534';
  setTimeout(()=>{
    btn.innerHTML='<i class="ti ti-download" aria-hidden="true"></i> Télécharger';
    btn.style.background='#0d3b6e';
  },2000);
}


init();
